services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: awards_api_prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-80}:8000"
    env_file:
      - .env
    restart: always
    volumes:
      - ./alembic/versions:/app/alembic/versions
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: awards_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-awards_db}
      POSTGRES_USER: ${POSTGRES_USER:-awards_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-awards_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_prod_data:
